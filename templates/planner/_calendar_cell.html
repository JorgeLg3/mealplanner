{# A single calendar slot (filled or empty), swappable via HTMX. #}
{# Context: date, meal_type, meal_type_label, meal (CalendarMeal or None) #}
<div class="week-grid__cell" id="cell-{{ date|date:'Y-m-d' }}-{{ meal_type }}">
  <span class="week-grid__meal-type">{{ meal_type_label }}</span>
  {% if meal %}
    <button type="button"
            class="week-grid__delete"
            aria-label="Remove meal"
            hx-delete="{% url 'calendarmeal' date meal_type %}"
            hx-target="#cell-{{ date|date:'Y-m-d' }}-{{ meal_type }}"
            hx-swap="outerHTML"
            hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>×</button>
    <span class="week-grid__recipe"
          title="Click to swap"
          hx-get="{% url 'calendarmeal_form' date meal_type %}"
          hx-target="#cell-{{ date|date:'Y-m-d' }}-{{ meal_type }}"
          hx-swap="outerHTML">{{ meal.recipe.name }}</span>
  {% else %}
    <button type="button"
            class="week-grid__add"
            hx-get="{% url 'calendarmeal_form' date meal_type %}"
            hx-target="#cell-{{ date|date:'Y-m-d' }}-{{ meal_type }}"
            hx-swap="outerHTML">+</button>
  {% endif %}
</div>
